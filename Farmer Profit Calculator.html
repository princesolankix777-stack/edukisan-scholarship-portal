<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Profit Calculator</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#f4f7f5;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        padding:20px;
    }

    .container{
        background:white;
        width:100%;
        max-width:600px;
        padding:30px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    h1{
        text-align:center;
        margin-bottom:20px;
        color:#2e7d32;
    }

    .input-group{
        margin-bottom:15px;
    }

    label{
        display:block;
        margin-bottom:5px;
        font-weight:bold;
    }

    input{
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        background:#2e7d32;
        color:white;
        font-size:18px;
        border-radius:8px;
        cursor:pointer;
        margin-top:10px;
    }

    button:hover{
        opacity:0.9;
    }

    .results{
        margin-top:25px;
        padding:20px;
        background:#f1f8e9;
        border-radius:10px;
        display:none;
    }

    .results h2{
        margin-bottom:15px;
        color:#1b5e20;
    }

    .result-item{
        margin-bottom:10px;
        font-size:17px;
    }

    @media(max-width:600px){
        .container{
            padding:20px;
        }
    }
</style>
</head>
<body>

<div class="container">

    <h1>🌾 Farmer Profit Calculator</h1>

    <div class="input-group">
        <label>Seed Cost (₹)</label>
        <input type="number" id="seed" value="0">
    </div>

    <div class="input-group">
        <label>Fertilizer Cost (₹)</label>
        <input type="number" id="fertilizer" value="0">
    </div>

    <div class="input-group">
        <label>Labor Cost (₹)</label>
        <input type="number" id="labor" value="0">
    </div>

    <div class="input-group">
        <label>Transport Cost (₹)</label>
        <input type="number" id="transport" value="0">
    </div>

    <div class="input-group">
        <label>Other Costs (₹)</label>
        <input type="number" id="other" value="0">
    </div>

    <div class="input-group">
        <label>Expected Yield (kg)</label>
        <input type="number" id="yield" value="0">
    </div>

    <div class="input-group">
        <label>Selling Price per kg (₹)</label>
        <input type="number" id="price" value="0">
    </div>

    <button onclick="calculateProfit()">Calculate Profit</button>

    <div class="results" id="results" style="display: block;">
        <h2>Results</h2>

        <div class="result-item" id="totalCost"><strong>Total Cost:</strong> ₹33000.00</div>
        <div class="result-item" id="revenue"><strong>Revenue:</strong> ₹50000.00</div>
        <div class="result-item" id="profit"><strong>Profit:</strong> ₹17000.00</div>
        <div class="result-item" id="profitPercent"><strong>Profit Percentage:</strong> 51.52%</div>
        <div class="result-item" id="breakEven"><strong>Break-even Price:</strong> ₹16.50 per kg</div>
    </div>

</div>

<script>

function calculateProfit(){

    let seed = parseFloat(document.getElementById("seed").value) || 0;
    let fertilizer = parseFloat(document.getElementById("fertilizer").value) || 0;
    let labor = parseFloat(document.getElementById("labor").value) || 0;
    let transport = parseFloat(document.getElementById("transport").value) || 0;
    let other = parseFloat(document.getElementById("other").value) || 0;
    let yieldKg = parseFloat(document.getElementById("yield").value) || 0;
    let price = parseFloat(document.getElementById("price").value) || 0;

    let totalCost = seed + fertilizer + labor + transport + other;

    let revenue = yieldKg * price;

    let profit = revenue - totalCost;

    let profitPercentage = totalCost > 0
        ? (profit / totalCost) * 100
        : 0;

    let breakEvenPrice = yieldKg > 0
        ? totalCost / yieldKg
        : 0;

    document.getElementById("totalCost").innerHTML =
        `<strong>Total Cost:</strong> ₹${totalCost.toFixed(2)}`;

    document.getElementById("revenue").innerHTML =
        `<strong>Revenue:</strong> ₹${revenue.toFixed(2)}`;

    document.getElementById("profit").innerHTML =
        `<strong>Profit:</strong> ₹${profit.toFixed(2)}`;

    document.getElementById("profitPercent").innerHTML =
        `<strong>Profit Percentage:</strong> ${profitPercentage.toFixed(2)}%`;

    document.getElementById("breakEven").innerHTML =
        `<strong>Break-even Price:</strong> ₹${breakEvenPrice.toFixed(2)} per kg`;

    document.getElementById("results").style.display = "block";
}

</script>


</body></html>
